<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>FRC5010 Robot Control</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    display: flex; flex-direction: column; height: 100dvh;
    background: #111; color: #eee; font-family: monospace; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  /* ---- field area (DS panel + canvas) ---- */
  #field-area {
    flex: 1; min-height: 0; display: flex; flex-direction: row;
    position: relative;
  }

  /* ---- driver station panel — floats over the left edge of the canvas ---- */
  #ds-panel {
    position: absolute; left: 0; top: 0; bottom: 0; z-index: 3;
    width: 160px;
    background: rgba(24,24,24,0.92); border-right: 1px solid #2a2a2a;
    display: flex; flex-direction: column;
    align-items: stretch; gap: 7px; padding: 10px 8px;
    overflow-y: auto;
  }
  .ds-title {
    font-size: 10px; color: #555; text-transform: uppercase;
    letter-spacing: 1px; text-align: center; padding-bottom: 2px;
    border-bottom: 1px solid #2a2a2a;
  }
  #conn-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #884444; margin: 2px auto 0;
    transition: background 0.3s;
  }
  #conn-dot.connected { background: #44cc44; }
  #ds-panel #enable-btn {
    width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #555;
    background: #2a2a2a; color: #aaa; cursor: pointer; font-size: 15px; font-weight: bold;
    transition: all 0.15s; user-select: none;
  }
  #ds-panel #enable-btn.enabled { background: #1a5c1a; border-color: #44cc44; color: #fff; }
  #ds-panel #stop-btn {
    width: 100%; padding: 10px 8px; border-radius: 8px; border: 2px solid #cc4400;
    background: #3a1000; color: #ff8844; cursor: pointer; font-size: 14px; font-weight: bold;
    user-select: none; transition: all 0.15s;
  }
  #ds-panel #stop-btn:active { filter: brightness(1.4); }
  #ds-panel #alliance-row { display: flex; flex-direction: column; gap: 6px; }
  #ds-panel .alliance-btn {
    padding: 7px 8px; border: 2px solid #555; border-radius: 6px;
    background: #222; color: #aaa; cursor: pointer; font-size: 14px; font-weight: bold;
    transition: all 0.15s; user-select: none; text-align: center;
  }
  #ds-panel .alliance-btn.active-blue { background: #003080; border-color: #5599ff; color: #fff; }
  #ds-panel .alliance-btn.active-red  { background: #800000; border-color: #ff4444; color: #fff; }
  .ds-section {
    font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px;
    text-align: center; margin-top: 2px;
  }
  #ds-panel #mode-row { display: flex; gap: 6px; }
  #ds-panel .mode-btn {
    flex: 1; padding: 7px 4px; border: 2px solid #555; border-radius: 6px;
    background: #222; color: #aaa; cursor: pointer; font-size: 13px; font-weight: bold;
    transition: all 0.15s; user-select: none; text-align: center;
  }
  #ds-panel .mode-btn.active-mode { background: #5a4a00; border-color: #ccaa00; color: #fff; }
  #ds-panel #auto-select {
    width: 100%; padding: 7px 6px; border: 2px solid #555; border-radius: 6px;
    background: #222; color: #ddd; cursor: pointer; font-size: 12px; font-weight: bold;
  }

  /* ---- canvas wrapper (flex:1, hosts the sidebar overlay) ---- */
  #canvas-wrap { flex: 1; min-width: 0; position: relative; }
  /* Held / scored counters — a compact panel pinned to the TOP-RIGHT, clear of the
     3D mechanism panel in the bottom-right corner. */
  #field-sidebar {
    position: absolute; right: 0; top: 0; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; padding: 8px 12px;
    background: rgba(20,20,20,0.7); border-radius: 0 0 0 6px;
    pointer-events: none;
  }
  .stat-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 20px; font-weight: bold; }
  #held-count   { color: rgba(245,210,40,0.95); }
  #scored-count { color: rgba(100,230,100,0.95); }
  #field-canvas { display: block; width: 100%; height: 100%; }

  /* ---- 3D mechanisms panel (isometric overlay, bottom-right of the field) ---- */
  #mech3d-panel {
    position: absolute; right: 0; bottom: 0; z-index: 2;
    background: rgba(20,20,20,0.85);
    border: 1px solid #2a2a2a; border-radius: 6px 0 0 0;
    display: flex; flex-direction: column;
  }
  #mech3d-panel.hidden { display: none; }
  /* Collapsed: just the title bar remains (a small button), so it gets out of the way
     of the field on narrow screens — and the poll loop stops fetching/drawing. */
  #mech3d-panel.collapsed #mech3d-canvas { display: none; }
  #mech3d-title {
    font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px;
    text-align: center; padding: 4px 8px; cursor: pointer; user-select: none;
  }
  #mech3d-title:hover { color: #ccc; }
  #mech3d-canvas {
    display: block; width: 270px; height: 230px;
    touch-action: none; cursor: grab;
  }

  /* ---- LED strip display (under the field) ---- */
  #led-bar {
    display: flex; justify-content: center; align-items: center; gap: 3px;
    padding: 6px 10px; background: #1a1a1a; border-top: 1px solid #2a2a2a;
    flex-shrink: 0;
  }
  #led-bar.hidden { display: none; }
  #led-bar .led-label {
    font-size: 9px; color: #555; text-transform: uppercase;
    letter-spacing: 1px; margin-right: 8px;
  }
  .led-cell {
    width: 13px; height: 13px; border-radius: 50%;
    background: #000; border: 1px solid #333; flex-shrink: 1; min-width: 5px;
  }

  /* ---- controls row ---- */
  #controls {
    display: flex; align-items: center; justify-content: center;
    padding: 8px; height: 200px; gap: 10px; flex-shrink: 0;
  }

  /* ---- thumbsticks ---- */
  .stick-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
  .stick-label { font-size: 11px; color: #888; }
  .stick-base {
    position: relative; border-radius: 50%; background: #2a2a2a;
    border: 2px solid #444; width: 120px; height: 120px; touch-action: none;
    flex-shrink: 0;
  }
  .stick-knob {
    position: absolute; border-radius: 50%; background: #666; border: 2px solid #999;
    width: 46px; height: 46px; top: 50%; left: 50%;
    transform: translate(-50%, -50%); pointer-events: none;
    transition: background 0.1s;
  }
  .stick-base.active .stick-knob { background: #aaa; }

  /* ---- Xbox face-button diamond ---- */
  #face-diamond {
    display: grid;
    grid-template-areas: ".  y  ." "x  .  b" ".  a  .";
    grid-template-columns: 36px 36px 36px;
    grid-template-rows:    36px 36px 36px;
    gap: 4px; flex-shrink: 0;
  }
  #face-diamond .btn-y { grid-area: y; }
  #face-diamond .btn-x { grid-area: x; }
  #face-diamond .btn-b { grid-area: b; }
  #face-diamond .btn-a { grid-area: a; }

  /* ---- shoulder buttons (LB / RB) ---- */
  .bumper-btn {
    width: 52px; height: 76px;
    border-radius: 10px; border: 2px solid #666;
    background: #252525; color: #bbb;
    cursor: pointer; font-size: 13px; font-weight: bold;
    user-select: none; touch-action: none;
    display: flex; align-items: center; justify-content: center;
    transition: filter 0.1s; flex-shrink: 0;
  }
  .bumper-btn.held, .bumper-btn:active { filter: brightness(1.6); border-color: #aaa; }

  /* game buttons (face buttons only now) */
  .game-btn {
    width: 36px; height: 36px; border-radius: 7px; border: 2px solid #555;
    background: #2a2a2a; color: #ccc; cursor: pointer; font-size: 12px; font-weight: bold;
    user-select: none; touch-action: none; transition: filter 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .game-btn:active, .game-btn.held { filter: brightness(1.6); }
  .btn-a  { background: #1a4a1a; border-color: #44cc44; color: #8f8; }
  .btn-b  { background: #4a1a1a; border-color: #cc4444; color: #f88; }
  .btn-x  { background: #1a1a4a; border-color: #4444cc; color: #88f; }
  .btn-y  { background: #4a3a00; border-color: #ccaa00; color: #ff8; }
  /* Narrow phones: shrink everything so controls fit. */
  @media (max-width: 560px) {
    .stick-base  { width: 96px; height: 96px; }
    .stick-knob  { width: 38px; height: 38px; }
    .game-btn    { width: 30px; height: 30px; font-size: 11px; }
    #face-diamond {
      grid-template-columns: 30px 30px 30px;
      grid-template-rows:    30px 30px 30px;
    }
    .bumper-btn  { width: 42px; height: 64px; font-size: 11px; }
    #controls    { height: 180px; gap: 6px; padding: 6px; }
    #ds-panel    { width: 120px; }
    #mech3d-canvas { width: 190px; height: 160px; }
  }

  /* keyboard key hints inside buttons */
  .key-hint {
    display: block; font-size: 8px; color: #777; font-weight: normal;
    letter-spacing: 0; line-height: 1.2;
  }
  #enable-btn .key-hint { font-size: 9px; }

  /* status bar */
  #status {
    padding: 4px 10px; background: #1a1a1a; font-size: 12px; color: #888;
    border-top: 1px solid #2a2a2a; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; flex-shrink: 0;
  }
  #status .ok  { color: #44cc44; }
  #status .bad { color: #cc4444; }
</style>
</head>
<body>
<div id="field-area">
  <div id="ds-panel">
    <div class="ds-title">Driver Station</div>
    <div id="conn-dot"></div>
    <button id="enable-btn" onclick="toggleEnable()">ENABLE<span class="key-hint">Space</span></button>
    <button id="stop-btn"   onclick="stopRobot()">STOP</button>
    <div id="alliance-row">
      <button class="alliance-btn active-blue" id="btn-blue" onclick="selectAlliance('Blue')">Blue</button>
      <button class="alliance-btn"             id="btn-red"  onclick="selectAlliance('Red')">Red</button>
    </div>
    <div class="ds-section">Mode</div>
    <div id="mode-row">
      <button class="mode-btn active-mode" id="btn-teleop" onclick="selectMode('teleop')">Teleop</button>
      <button class="mode-btn"             id="btn-auto"   onclick="selectMode('auto')">Auto</button>
    </div>
    <div class="ds-section">Auto Routine</div>
    <select id="auto-select" onchange="selectAuto(this.value)"></select>
  </div>
  <div id="canvas-wrap">
    <div id="field-sidebar">
      <div class="stat-item">
        <div class="stat-label">Held</div>
        <div id="held-count" class="stat-value">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Scored</div>
        <div id="scored-count" class="stat-value">0</div>
      </div>
    </div>
    <div id="mech3d-panel" class="hidden">
      <div id="mech3d-title" onclick="toggleMech3d()">Mechanisms 3D — drag to rotate ▾</div>
      <canvas id="mech3d-canvas"></canvas>
    </div>
    <canvas id="field-canvas"></canvas>
  </div>
</div>

<div id="led-bar" class="hidden"><span class="led-label">LEDs</span></div>

<div id="controls">
  <div class="bumper-btn" data-idx="4">LB<span class="key-hint">Z</span></div>

  <div class="stick-wrap">
    <div class="stick-base" id="left-base"><div class="stick-knob" id="left-knob"></div></div>
    <span class="stick-label">Translate</span>
  </div>

  <div id="face-diamond">
    <div class="game-btn btn-y" data-idx="3">Y<span class="key-hint">G</span></div>
    <div class="game-btn btn-x" data-idx="2">X<span class="key-hint">V</span></div>
    <div class="game-btn btn-b" data-idx="1">B<span class="key-hint">C</span></div>
    <div class="game-btn btn-a" data-idx="0">A<span class="key-hint">F</span></div>
  </div>

  <div class="stick-wrap">
    <div class="stick-base" id="right-base"><div class="stick-knob" id="right-knob"></div></div>
    <span class="stick-label">Rotate</span>
  </div>

  <div class="bumper-btn" data-idx="5">RB<span class="key-hint">X</span></div>
</div>

<div id="status">Connecting…</div>

<script>
'use strict';

// ---- State ----
const state = {
  x: 0, y: 0, headingRad: 0, gyroRad: 0,
  maxLinear: 4.5, maxAngular: 6.283,
  fieldWidth: 16.540988, fieldHeight: 8.21,
  enabled: false, alliance: 'Blue', connected: false,
  mode: 'teleop', selectedAuto: '',
  heldFuel: 0, intakeExtended: false, scoredFuel: 0,
  visibleTags: [],
  leds: []
};

let leftX = 0, leftY = 0, rightX = 0;
const buttonHeld = [false, false, false, false, false, false];
const keys = {};
let gamePieces = [];        // [{x, y}] grounded Fuel — from /api/gamepieces
let flyingPieces = [];     // [{x, y}] in-flight Fuel projectiles

// ---- Keyboard ----
// Drive: W/S/ArrowUp/Down = fwd/back, A/D = strafe, Q/E/ArrowLeft/Right = rotate.
// Buttons: Z=LB(extend), X=RB(retract), F=A(fire), C=B, V=X-btn, G=Y, Space=Enable.
const KEY_BUTTON_MAP = { 'z': 4, 'x': 5, 'f': 0, 'c': 1, 'v': 2, 'g': 3 };

document.addEventListener('keydown', e => {
  const k = e.key === ' ' ? ' ' : e.key.toLowerCase();
  if (k === ' ') { e.preventDefault(); toggleEnable(); return; }
  keys[k] = true;
  const idx = KEY_BUTTON_MAP[k];
  if (idx !== undefined) {
    e.preventDefault();
    buttonHeld[idx] = true;
    document.querySelector(`[data-idx="${idx}"]`)?.classList.add('held');
  }
});
document.addEventListener('keyup', e => {
  const k = e.key === ' ' ? ' ' : e.key.toLowerCase();
  keys[k] = false;
  const idx = KEY_BUTTON_MAP[k];
  if (idx !== undefined) {
    buttonHeld[idx] = false;
    document.querySelector(`[data-idx="${idx}"]`)?.classList.remove('held');
  }
});

function keyboardInputs() {
  const vx    = (keys['w'] ? 1 : 0) - (keys['s'] ? 1 : 0)
              + (keys['arrowup'] ? 1 : 0) - (keys['arrowdown'] ? 1 : 0);
  const vy    = (keys['a'] ? 1 : 0) - (keys['d'] ? 1 : 0);
  const omega = (keys['q'] ? 1 : 0) - (keys['e'] ? 1 : 0)
              + (keys['arrowleft'] ? 1 : 0) - (keys['arrowright'] ? 1 : 0);
  return { vx: Math.max(-1, Math.min(1, vx)),
           vy: Math.max(-1, Math.min(1, vy)),
           omega: Math.max(-1, Math.min(1, omega)) };
}

// ---- Thumbsticks (Pointer Events) ----
function setupStick(baseId, knobId, onUpdate) {
  const base = document.getElementById(baseId);
  const knob = document.getElementById(knobId);
  let active = false;

  function update(e) {
    const r = base.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top  + r.height / 2;
    const radius = r.width / 2;
    let dx = (e.clientX - cx) / radius;
    let dy = (e.clientY - cy) / radius;
    const mag = Math.sqrt(dx * dx + dy * dy);
    if (mag > 1) { dx /= mag; dy /= mag; }
    const DEAD = 0.05;
    if (mag < DEAD) { dx = 0; dy = 0; }
    onUpdate(dx, dy);
    knob.style.left = (50 + dx * 44) + '%';
    knob.style.top  = (50 + dy * 44) + '%';
  }

  function reset() {
    onUpdate(0, 0);
    knob.style.left = '50%';
    knob.style.top  = '50%';
    base.classList.remove('active');
  }

  base.addEventListener('pointerdown', e => {
    active = true; base.setPointerCapture(e.pointerId);
    base.classList.add('active'); update(e);
  });
  base.addEventListener('pointermove',  e => { if (active) update(e); });
  base.addEventListener('pointerup',    () => { active = false; reset(); });
  base.addEventListener('pointercancel',() => { active = false; reset(); });
}

setupStick('left-base',  'left-knob',  (dx, dy) => { leftX =  dx; leftY = dy; });
setupStick('right-base', 'right-knob', (dx, dy) => { rightX = dx; });

// ---- Game buttons (face buttons + bumpers) ----
document.querySelectorAll('.game-btn, .bumper-btn').forEach(btn => {
  const idx = parseInt(btn.dataset.idx);
  btn.addEventListener('pointerdown',  e => { btn.setPointerCapture(e.pointerId); buttonHeld[idx] = true;  btn.classList.add('held'); });
  btn.addEventListener('pointerup',    () => { buttonHeld[idx] = false; btn.classList.remove('held'); });
  btn.addEventListener('pointercancel',() => { buttonHeld[idx] = false; btn.classList.remove('held'); });
});

// ---- Alliance, Mode, Auto & Enable ----
let currentAlliance = 'Blue';
let currentEnabled  = false;
let currentMode     = 'teleop';
let currentAuto     = '';
let hasInitialized  = false;

// Called once on first successful /api/state response to seed UI from server state.
function initFromState(s) {
  if (hasInitialized) return;
  hasInitialized = true;
  currentAlliance = s.alliance || 'Blue';
  currentEnabled  = s.enabled  || false;
  currentMode     = s.mode     || 'teleop';
  currentAuto     = s.selectedAuto || '';
  updateAllianceBtns();
  updateEnableBtn();
  updateModeBtns();
  loadAutos();
}

// Fetch the available auto routines once and build the selector options.
function loadAutos() {
  fetch('/api/autos').then(r => r.json()).then(d => {
    const sel = document.getElementById('auto-select');
    sel.innerHTML = '';
    (d.autos || []).forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      sel.appendChild(opt);
    });
    currentAuto = d.selected || currentAuto || (d.autos && d.autos[0]) || '';
    sel.value = currentAuto;
    if ((d.autos || []).length === 0) sel.style.display = 'none';
  }).catch(() => {});
}

function selectAlliance(a) {
  currentAlliance = a;
  updateAllianceBtns();
  // Send only alliance — no enabled field, so the backend won't touch DriverStation enabled state.
  fetch('/api/control', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ alliance: currentAlliance })
  }).catch(() => {});
}

function toggleEnable() {
  currentEnabled = !currentEnabled;
  updateEnableBtn();
  // Send only enabled — no alliance field, so the backend won't call resetToAllianceStart().
  fetch('/api/control', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ enabled: currentEnabled })
  }).catch(() => {});
}

function updateAllianceBtns() {
  const a = currentAlliance;
  document.getElementById('btn-blue').className = 'alliance-btn' + (a === 'Blue' ? ' active-blue' : '');
  document.getElementById('btn-red').className  = 'alliance-btn' + (a === 'Red'  ? ' active-red'  : '');
}

function selectMode(m) {
  currentMode = m;
  updateModeBtns();
  // Mode applies on the next Enable (a real DS can't switch auto/teleop while enabled).
  fetch('/api/control', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ mode: m })
  }).catch(() => {});
}

function updateModeBtns() {
  document.getElementById('btn-teleop').className = 'mode-btn' + (currentMode === 'teleop' ? ' active-mode' : '');
  document.getElementById('btn-auto').className   = 'mode-btn' + (currentMode === 'auto'   ? ' active-mode' : '');
}

function selectAuto(name) {
  currentAuto = name;
  fetch('/api/control', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ auto: name })
  }).catch(() => {});
}

function updateEnableBtn() {
  const btn = document.getElementById('enable-btn');
  btn.innerHTML = (currentEnabled ? 'DISABLE' : 'ENABLE') + '<span class="key-hint">Space</span>';
  btn.className = currentEnabled ? 'enabled' : '';
}

function stopRobot() {
  if (!confirm('Stop the simulation? This will end the Gradle process.')) return;
  fetch('/api/stop', { method: 'POST' }).catch(() => {});
}

function updateSidebar() {
  document.getElementById('held-count').textContent   = state.heldFuel;
  document.getElementById('scored-count').textContent = state.scoredFuel;
}

// ---- LED strip display ----
// Mirrors the robot's addressable LED strip ("leds" hex array in /api/state).
// Hidden until the robot reports a strip; cells are created once per strip length.
function updateLeds() {
  const bar  = document.getElementById('led-bar');
  const leds = state.leds || [];
  bar.classList.toggle('hidden', leds.length === 0);
  const cells = bar.getElementsByClassName('led-cell');
  while (cells.length < leds.length) {
    const c = document.createElement('div');
    c.className = 'led-cell';
    bar.appendChild(c);
  }
  while (cells.length > leds.length) bar.removeChild(bar.lastElementChild);
  for (let i = 0; i < leds.length; i++) {
    const col = leds[i];
    cells[i].style.background = col;
    // Lit LEDs glow; off LEDs stay flat dark so animations read clearly.
    cells[i].style.boxShadow = (col === '#000000') ? 'none' : `0 0 6px 1px ${col}`;
  }
}

// ---- 3D mechanisms isometric view ----
// Renders the robot's mechanisms (from /api/mechanisms3d) as a wireframe on a small
// overlay canvas: chassis box + per-mechanism line segments in robot coordinates
// (x forward, y left, z up). Drag horizontally to orbit the view about the Z axis.
const mechCanvas = document.getElementById('mech3d-canvas');
let mech3d = null;          // last /api/mechanisms3d payload
let mechViewYaw = -0.6;     // view orbit angle, radians
let mech3dExpanded = true;  // false = collapsed → loop skips the fetch and the draw
let mech3dHasContent = false; // robot reported a chassis/mechanisms to draw

// Collapse/expand the 3D panel. While collapsed only the title bar shows (out of the
// way on narrow screens) and the poll loop stops fetching /api/mechanisms3d entirely.
function toggleMech3d() { mech3dExpanded = !mech3dExpanded; updateMech3d(); }

// Updates the panel chrome each cycle and (re)draws when expanded. Splitting this from
// drawMech3d() lets the loop keep the chrome live even when drawing is skipped.
function updateMech3d() {
  const panel = document.getElementById('mech3d-panel');
  panel.classList.toggle('hidden', !mech3dHasContent);
  panel.classList.toggle('collapsed', !mech3dExpanded);
  document.getElementById('mech3d-title').textContent =
      mech3dExpanded ? 'Mechanisms 3D — drag to rotate ▾' : 'Mechanisms 3D ▸';
  if (mech3dExpanded && mech3dHasContent) drawMech3d();
}

(() => {
  let dragging = false, lastX = 0;
  mechCanvas.addEventListener('pointerdown', e => {
    dragging = true; lastX = e.clientX; mechCanvas.setPointerCapture(e.pointerId);
  });
  mechCanvas.addEventListener('pointermove', e => {
    if (!dragging) return;
    mechViewYaw += (e.clientX - lastX) * 0.01;
    lastX = e.clientX;
  });
  mechCanvas.addEventListener('pointerup',     () => { dragging = false; });
  mechCanvas.addEventListener('pointercancel', () => { dragging = false; });
})();

// Classic isometric projection after orbiting the robot about Z by the view yaw:
// u = (x' − y')·cos30°, v = (x' + y')·sin30° − z (screen-down +v). Unscaled.
function isoUV(p) {
  const c = Math.cos(mechViewYaw), s = Math.sin(mechViewYaw);
  const x = p[0] * c - p[1] * s;
  const y = p[0] * s + p[1] * c;
  return [(x - y) * 0.8660, (x + y) * 0.5 - p[2]];
}

function drawMech3d() {
  const mechs = (mech3d && mech3d.mechanisms) || [];
  const sw = (mech3d && mech3d.swerve) || [];

  const ctx = mechCanvas.getContext('2d');
  const W = mechCanvas.width  = mechCanvas.clientWidth;
  const H = mechCanvas.height = mechCanvas.clientHeight;
  if (W < 1 || H < 1) return;
  ctx.clearRect(0, 0, W, H);

  // Chassis box corners; index 0..3 = +x+y, +x−y, −x−y, −x+y (so 0→1 is the front edge).
  const ch = mech3d.chassis || { length: 0.8, width: 0.8, height: 0.13 };
  const hx = ch.length / 2, hy = ch.width / 2;
  const bottom = [[hx, hy, 0], [hx, -hy, 0], [-hx, -hy, 0], [-hx, hy, 0]];
  const top = bottom.map(p => [p[0], p[1], ch.height]);

  // Each swerve module: a line through the module position (floor level) along its
  // steer angle, whose length grows with the drive speed — so both the steer direction
  // and how fast the wheel is rolling read at a glance. Payload: [cx, cy, angle, frac]
  // where frac is the signed speed as a fraction of the drivetrain's max speed.
  const wr = (ch.wheelRadius || 0.05);
  const wheels = sw.map(m => {
    const [cx, cy, ang, frac] = m;
    const half = wr * 0.5 + Math.abs(frac || 0) * ch.length * 0.35;
    const dx = Math.cos(ang) * half, dy = Math.sin(ang) * half;
    return [[cx - dx, cy - dy, 0], [cx + dx, cy + dy, 0]];
  });

  // Gyro compass on the floor: a needle pointing toward field-forward in the robot
  // frame (state.gyroRad), so it sweeps around the chassis as the robot's heading
  // changes — the robot-relative orientation indicator, here on the 3D display.
  const gyro = (state.gyroRad ?? 0);
  const gyroR = Math.max(hx, hy) * 1.3;
  const gdx = Math.cos(gyro) * gyroR, gdy = -Math.sin(gyro) * gyroR; // field +X in robot frame
  const gyroRing = [];
  for (let k = 0; k < 24; k++) {
    const a0 = 2 * Math.PI * k / 24, a1 = 2 * Math.PI * (k + 1) / 24;
    gyroRing.push([[gyroR * Math.cos(a0), gyroR * Math.sin(a0), 0],
                   [gyroR * Math.cos(a1), gyroR * Math.sin(a1), 0]]);
  }

  // Auto-fit: project every point and fit the bounds into the canvas with a margin,
  // so the view stays framed at any orbit angle and mechanism extension.
  const pts = [...bottom, ...top].map(isoUV);
  for (const w of wheels) { pts.push(isoUV(w[0])); pts.push(isoUV(w[1])); }
  pts.push(isoUV([gdx, gdy, 0]));
  for (let k = 0; k < gyroRing.length; k += 6) pts.push(isoUV(gyroRing[k][0]));
  for (const m of mechs) {
    for (const s of m.segments) { pts.push(isoUV(s.a)); pts.push(isoUV(s.b)); }
  }
  let uMin = 1e9, uMax = -1e9, vMin = 1e9, vMax = -1e9;
  for (const [u, v] of pts) {
    uMin = Math.min(uMin, u); uMax = Math.max(uMax, u);
    vMin = Math.min(vMin, v); vMax = Math.max(vMax, v);
  }
  const M = 12; // margin px
  const scale = Math.min((W - 2 * M) / Math.max(0.1, uMax - uMin),
                         (H - 2 * M) / Math.max(0.1, vMax - vMin));
  const offU = M + (W - 2 * M - (uMax - uMin) * scale) / 2;
  const offV = M + (H - 2 * M - (vMax - vMin) * scale) / 2;
  const px = p => {
    const [u, v] = isoUV(p);
    return [offU + (u - uMin) * scale, offV + (v - vMin) * scale];
  };
  const line = (a, b, color, width) => {
    const [ax, ay] = px(a), [bx, by] = px(b);
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
    ctx.strokeStyle = color; ctx.lineWidth = width; ctx.stroke();
  };

  // Chassis wireframe (dim) with a green front-edge marker for orientation.
  for (let i = 0; i < 4; i++) {
    line(bottom[i], bottom[(i + 1) % 4], '#3a3a3a', 1);
    line(top[i],    top[(i + 1) % 4],    '#4f4f4f', 1);
    line(bottom[i], top[i],              '#4f4f4f', 1);
  }
  line(top[0], top[1], '#3fb950', 1.5); // front edge (robot +X)

  // Gyro compass (cyan): ring on the floor + needle toward field-forward.
  for (const seg of gyroRing) line(seg[0], seg[1], 'rgba(34,211,238,0.35)', 1);
  line([0, 0, 0], [gdx, gdy, 0], '#22d3ee', 2.5);

  // Swerve wheels (light grey) — drawn on the floor at each module, steered live, with
  // length growing as the wheel rolls faster.
  for (const w of wheels) line(w[0], w[1], '#cdd9e5', 3);

  // Mechanism segments, exactly as the robot published them this cycle.
  for (const m of mechs) {
    for (const s of m.segments) line(s.a, s.b, s.c, s.w);
  }
}

// ---- Field Canvas rendering ----
const canvas = document.getElementById('field-canvas');

function fieldToCanvas(W, H) {
  const { x, y, headingRad, fieldWidth, fieldHeight, alliance } = state;
  let cx, cy, canvasAngle;
  if (alliance === 'Red') {
    cx = (y / fieldHeight) * W;
    cy = (x / fieldWidth)  * H;
    canvasAngle = -headingRad + Math.PI / 2;
  } else {
    cx = (1 - y / fieldHeight) * W;
    cy = H - (x / fieldWidth) * H;
    canvasAngle = -headingRad - Math.PI / 2;
  }
  return { cx, cy, canvasAngle };
}

// Convert any field point (metres) to canvas pixel coords for current alliance view.
function fieldPt(fx, fy, W, H) {
  const { fieldWidth, fieldHeight, alliance } = state;
  if (alliance === 'Red') return { cx: (fy / fieldHeight) * W, cy: (fx / fieldWidth) * H };
  return { cx: (1 - fy / fieldHeight) * W, cy: H - (fx / fieldWidth) * H };
}

// Convert a field angle (CCW from +X, radians) to a canvas rotation angle.
function fieldAngle(rad) {
  return state.alliance === 'Red' ? -rad + Math.PI / 2 : -rad - Math.PI / 2;
}

// Average pixels-per-metre scale (used for label sizing only).
function mToPx(m, W, H) {
  return m * (W / state.fieldHeight + H / state.fieldWidth) / 2;
}

// Draw a field-axis-aligned rectangle (rotation 0 in field frame) by mapping its
// four corners through fieldPt — correct for both alliance views automatically.
function fieldRect(ctx, fx, fy, dx, dy, W, H, fill, stroke) {
  const c = [
    fieldPt(fx - dx / 2, fy - dy / 2, W, H),
    fieldPt(fx + dx / 2, fy - dy / 2, W, H),
    fieldPt(fx + dx / 2, fy + dy / 2, W, H),
    fieldPt(fx - dx / 2, fy + dy / 2, W, H),
  ];
  ctx.beginPath();
  ctx.moveTo(c[0].cx, c[0].cy);
  for (let i = 1; i < 4; i++) ctx.lineTo(c[i].cx, c[i].cy);
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.stroke();
}

function fieldLabel(ctx, fx, fy, text, px, W, H) {
  const { cx, cy } = fieldPt(fx, fy, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${px}px monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, cx, cy);
}

// Draw a regular flat-top hexagon (radius R metres) centred at a field point.
function fieldHexagon(ctx, fx, fy, R, W, H, fill, stroke) {
  const pts = [];
  for (let k = 0; k < 6; k++) {
    const a = Math.PI / 6 + k * Math.PI / 3;
    pts.push(fieldPt(fx + R * Math.cos(a), fy + R * Math.sin(a), W, H));
  }
  ctx.beginPath();
  ctx.moveTo(pts[0].cx, pts[0].cy);
  for (let i = 1; i < 6; i++) ctx.lineTo(pts[i].cx, pts[i].cy);
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.stroke();
}

// ---- Arena2026Rebuilt obstacle geometry (decoded from IronMaple YAGSL bytecode) ----
// All obstacles are axis-aligned (Rotation2d.kZero) in the WPILib field frame.
// SimulatedArena.getInstance() builds Arena2026Rebuilt(false), so the ACTIVE
// collision bodies are:
//   Hub    (RebuiltHub.blue/redHubPose): 47"×47" = 1.19m square; the 217" "bump"
//          variant only exists in the Arena2026Rebuilt(true) branch, which is unused.
//   Trench (anonymous): 53"×12" = 1.35m×0.30m bars at the four corners around centre.
//   Tower  (anonymous, near each alliance wall): 2"×47" = 0.05m×1.19m thin walls.
// GoalRadius (0.5969m) is the circular scoring target, inscribed in the 47" square.
// NOTE: the library has a copy-paste bug — the 4th trench was duplicated at the
// blue-near corner instead of the red-far corner (11.915,6.639). Arena2026Patch
// (applied in SwerveFactory) injects the missing red-far body into the physics
// world, so all four bars drawn here now match the actual collision bodies.
function drawObstacles(ctx, W, H) {
  const M = 0.0254;  // inches → metres

  const hubs = [
    { fx: 4.5974, fy: 4.0345, team: 'Blue' },
    { fx: 11.938, fy: 4.0345, team: 'Red'  },
  ];

  // ---- Hub structure band (47"×217") spanning between the two trenches ----
  // The raised alliance structure that links the hub to its trench bars. Drawn
  // faintly first so the hub and bars sit on top. (Cosmetic — not a collision body.)
  const bandW = 47 * M, bandH = 217 * M;
  for (const h of hubs) {
    const band = h.team === 'Blue' ? 'rgba(0,50,180,0.18)' : 'rgba(180,0,0,0.18)';
    fieldRect(ctx, h.fx, h.fy, bandW, bandH, W, H, band, 'rgba(255,255,255,0.10)');
  }

  // ---- Trench bars (53"×12") at the four corners around field centre (8.27, 4.035) ----
  // offsetX = (120+23.5)" = 3.6449m ; offsetY = (73+23.5+6)" = 2.6035m
  const trW = 53 * M, trH = 12 * M;
  const trenches = [
    { fx: 4.6251,  fy: 1.4315 },  // blue-near
    { fx: 11.9149, fy: 1.4315 },  // red-near
    { fx: 4.6251,  fy: 6.6385 },  // blue-far
    { fx: 11.9149, fy: 6.6385 },  // red-far (library bug duplicates blue-near here)
  ];
  for (const t of trenches) {
    fieldRect(ctx, t.fx, t.fy, trW, trH, W, H, 'rgba(58,62,72,0.95)', '#c4c8d4');
  }
  fieldLabel(ctx, trenches[0].fx, trenches[0].fy, 'Trench',
      Math.max(8, Math.round(mToPx(0.22, W, H))), W, H);

  // ---- Hubs: hexagonal structure (47" footprint) + circular scoring target ----
  // Collision body is the 47" square; the hexagon is the visual hub shape.
  const hubR = 0.65;          // hexagon circumradius (≈ 47" half-diagonal), metres
  const goalRadius = 0.5969;  // RebuiltHub.GoalRadius — scoring circle, metres
  for (const h of hubs) {
    const fill   = h.team === 'Blue' ? 'rgba(0,50,180,0.55)' : 'rgba(180,0,0,0.55)';
    const stroke = h.team === 'Blue' ? '#88aaff' : '#ff8888';
    fieldHexagon(ctx, h.fx, h.fy, hubR, W, H, fill, stroke);
    const { cx, cy } = fieldPt(h.fx, h.fy, W, H);
    const rPx = mToPx(goalRadius, W, H);
    ctx.beginPath();
    ctx.arc(cx, cy, rPx, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(255,255,255,0.20)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.80)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    fieldLabel(ctx, h.fx, h.fy, 'Hub', Math.max(10, Math.round(mToPx(0.30, W, H))), W, H);
  }

  // ---- Tower walls (2"×47", near each alliance wall) ----
  const twW = 2 * M, twH = 47 * M;
  const towers = [
    { fx: 1.0668,  fy: 4.0386 },
    { fx: 15.4686, fy: 4.318  },
  ];
  for (const t of towers) {
    fieldRect(ctx, t.fx, t.fy, twW, twH, W, H, 'rgba(58,62,72,0.95)', '#c4c8d4');
    fieldLabel(ctx, t.fx, t.fy, 'Tower', Math.max(8, Math.round(mToPx(0.2, W, H))), W, H);
  }
}

// Draw each AprilTag as a screen-aligned fiducial billboard with a facing-direction
// tick and its ID. Top-down a tag is edge-on, so we billboard the image for legibility
// and use the tick to convey which way it faces.
function drawAprilTags(ctx, W, H) {
  const sz = Math.max(13, mToPx(0.32, W, H));
  // Tags the camera currently sees are highlighted red; the rest use the default teal.
  const visible = new Set(state.visibleTags || []);
  const TEAL = 'rgba(0,230,170,0.95)';
  const RED  = 'rgba(255,60,60,0.98)';
  for (const t of aprilTags) {
    const { cx, cy } = fieldPt(t.fx, t.fy, W, H);
    const a = fieldAngle(t.yaw);
    const seen = visible.has(t.id);
    const accent = seen ? RED : TEAL;

    // Facing tick (rotated to the tag's heading)
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(a);
    ctx.strokeStyle = accent;
    ctx.lineWidth = seen ? 3 : 2;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -sz * 0.85); ctx.stroke();
    ctx.restore();

    // Fiducial billboard (screen-aligned) + ID label
    ctx.save();
    ctx.translate(cx, cy);
    // Red glow behind the fiducial when the camera can see it.
    if (seen) {
      ctx.shadowColor = RED;
      ctx.shadowBlur = sz * 0.6;
    }
    const img = tagImages[t.id];
    if (img && img.complete && img.naturalWidth) {
      ctx.drawImage(img, -sz / 2, -sz / 2, sz, sz);
    } else {
      ctx.fillStyle = '#000'; ctx.fillRect(-sz / 2, -sz / 2, sz, sz);
    }
    ctx.shadowBlur = 0;
    ctx.strokeStyle = accent;
    ctx.lineWidth = seen ? 2.5 : 1;
    ctx.strokeRect(-sz / 2, -sz / 2, sz, sz);
    ctx.fillStyle = seen ? '#ff5050' : '#0fc';
    ctx.font = `bold ${Math.max(8, Math.round(sz * 0.5))}px monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(t.id, 0, sz / 2 + 1);
    ctx.restore();
  }
}

// Draw grounded Fuel pieces and in-flight projectiles.
function drawGamePieces(ctx, W, H) {
  const sz = Math.max(8, mToPx(0.15, W, H));
  const half = sz / 2;
  const useFuelImg = fuelImg.complete && fuelImg.naturalWidth > 0;

  // Grounded pieces — fuel image or yellow disc fallback
  for (const p of gamePieces) {
    const { cx, cy } = fieldPt(p.x, p.y, W, H);
    if (useFuelImg) {
      ctx.drawImage(fuelImg, cx - half, cy - half, sz, sz);
    } else {
      ctx.beginPath();
      ctx.arc(cx, cy, half, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(245,210,40,0.95)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(120,90,0,0.8)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Flying projectiles — slightly smaller, white-ringed or image at 70% opacity
  const szFly = Math.max(6, mToPx(0.11, W, H));
  const halfFly = szFly / 2;
  for (const p of flyingPieces) {
    const { cx, cy } = fieldPt(p.x, p.y, W, H);
    if (useFuelImg) {
      ctx.save();
      ctx.globalAlpha = 0.75;
      ctx.drawImage(fuelImg, cx - halfFly, cy - halfFly, szFly, szFly);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(cx, cy, halfFly, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(255,230,80,1.0)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,200,0.9)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }
}

function drawField() {
  const ctx = canvas.getContext('2d');
  const cw = canvas.width  = canvas.clientWidth;
  const ch = canvas.height = canvas.clientHeight;
  if (cw < 1 || ch < 1) return;

  // ---- Preserve the field's TRUE aspect ratio (no horizontal stretch) ----
  // The view is portrait: canvas width maps to the field's short Y-axis
  // (fieldHeight m) and canvas height maps to the long X-axis (fieldWidth m).
  // Target backing-store aspect W/H = fieldHeight/fieldWidth (< 1). Fit that
  // rectangle inside the available element box and letterbox the remainder.
  const aspect = state.fieldHeight / state.fieldWidth;
  let W, H, offX, offY;
  if (cw / ch > aspect) {           // element is wider than the field → pillar-box
    H = ch; W = Math.round(ch * aspect);
    offX = Math.round((cw - W) / 2); offY = 0;
  } else {                          // element is taller than the field → letter-box
    W = cw; H = Math.round(cw / aspect);
    offX = 0; offY = Math.round((ch - H) / 2);
  }

  // Dark fill behind the letterbox bars (matches the page background).
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, cw, ch);

  // Everything below draws in field-render space (W×H), offset into the element.
  ctx.save();
  ctx.translate(offX, offY);

  // Background — field-floor grey (matches the game render)
  ctx.fillStyle = '#6a6a6d';
  ctx.fillRect(0, 0, W, H);

  const { alliance } = state;
  const isRed = alliance === 'Red';

  // Alliance zones end at the trench/hub wall-side line: X = 4.6251 - 53"/2 = 3.952 m
  // from each alliance wall (symmetric), i.e. ~23.9 % of the field length inward.
  const zoneFrac = 3.952 / state.fieldWidth;
  const ownClr = isRed ? 'rgba(180,0,0,0.30)'  : 'rgba(0,60,200,0.30)';
  const oppClr = isRed ? 'rgba(0,60,200,0.30)' : 'rgba(180,0,0,0.30)';
  ctx.fillStyle = ownClr; ctx.fillRect(0, H * (1 - zoneFrac), W, H * zoneFrac);
  ctx.fillStyle = oppClr; ctx.fillRect(0, 0,                   W, H * zoneFrac);

  // Fine zone-boundary lines (the trench/hub bottom line, across the whole field)
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H * (1 - zoneFrac)); ctx.lineTo(W, H * (1 - zoneFrac)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, H * zoneFrac);       ctx.lineTo(W, H * zoneFrac);       ctx.stroke();

  // White centre line
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2); ctx.stroke();

  // ---- Arena2026Rebuilt obstacles ----
  drawObstacles(ctx, W, H);

  // ---- AprilTags ----
  drawAprilTags(ctx, W, H);

  // ---- Game pieces (Fuel) — drawn after obstacles so they sit on top ----
  drawGamePieces(ctx, W, H);

  // Magenta field perimeter (the field wall / barrier), drawn on top.
  ctx.strokeStyle = '#d838c8'; ctx.lineWidth = 4;
  ctx.strokeRect(2, 2, W - 4, H - 4);

  // ---- Robot ----
  const { cx, cy, canvasAngle } = fieldToCanvas(W, H);
  const robotPx = (0.76 / state.fieldHeight) * W;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(canvasAngle);

  // Intake arm — drawn first so it appears behind the robot body.
  // The arm extends from the front bumper edge outward by 12" (0.305 m).
  if (state.intakeExtended) {
    const intakeLenPx = mToPx(0.305, W, H);
    const intakeWPx   = robotPx * 0.55;
    ctx.fillStyle   = 'rgba(50,220,80,0.75)';
    ctx.strokeStyle = 'rgba(80,255,80,0.95)';
    ctx.lineWidth   = 1.5;
    ctx.fillRect(-intakeWPx / 2, -robotPx / 2 - intakeLenPx, intakeWPx, intakeLenPx);
    ctx.strokeRect(-intakeWPx / 2, -robotPx / 2 - intakeLenPx, intakeWPx, intakeLenPx);
  }

  // Robot body
  ctx.fillStyle = state.connected ? (isRed ? '#aa2222' : '#2244aa') : '#555';
  ctx.fillRect(-robotPx / 2, -robotPx / 2, robotPx, robotPx);

  // Heading indicator — small light-green arrow inside the robot body,
  // pointing toward the front (up in local frame = heading direction).
  ctx.fillStyle = '#90ee90';
  const aw = robotPx * 0.20;
  ctx.beginPath();
  ctx.moveTo(0,         -robotPx * 0.30);  // tip (near front edge)
  ctx.lineTo( aw,        robotPx * 0.15);  // back-right
  ctx.lineTo(-aw,        robotPx * 0.15);  // back-left
  ctx.closePath();
  ctx.fill();

  ctx.restore();

  ctx.restore();   // field-render offset (letterbox)
}

// ---- Communication loop (50 ms) ----
setInterval(async () => {
  const kb = keyboardInputs();
  const vx    = kb.vx    || -leftY;
  const vy    = kb.vy    || -leftX;   // screen-right = field-right = -Y in WPILib
  const omega = kb.omega || -rightX;  // screen-right = CW = negative omega in WPILib

  // Fetch game piece positions (fire-and-forget; drawn on next frame)
  fetch('/api/gamepieces').then(r => r.json()).then(d => {
    gamePieces   = (d.pieces  || []).map(p => ({ x: p[0], y: p[1] }));
    flyingPieces = (d.flying  || []).map(p => ({ x: p[0], y: p[1] }));
  }).catch(() => {});

  // Fetch mechanism 3D segments only while the panel is expanded — collapsing it stops
  // this request (and the draw below) so a hidden panel costs nothing client or server.
  if (mech3dExpanded) {
    fetch('/api/mechanisms3d').then(r => r.json()).then(d => {
      mech3d = d;
      mech3dHasContent = ((d.mechanisms || []).length + (d.swerve || []).length) > 0;
    }).catch(() => {});
  }

  // POST drive command (fire-and-forget)
  fetch('/api/drive', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ vx, vy, omega, buttons: [...buttonHeld] })
  }).catch(() => {});

  // GET robot state
  try {
    const resp = await fetch('/api/state');
    const s = await resp.json();
    Object.assign(state, s);
    initFromState(s);
    updateSidebar();
    updateLeds();
    updateStatus(vx, vy, omega);
    drawField();
    updateMech3d();
  } catch (e) {
    state.connected = false;
    updateStatus(0, 0, 0);
    drawField();
    updateMech3d();
  }
}, 50);

// ---- Status bar ----
function updateStatus(vx, vy, omega) {
  const dot = document.getElementById('conn-dot');
  if (dot) dot.classList.toggle('connected', state.connected);
  const el = document.getElementById('status');
  const connEl = state.connected
    ? '<span class="ok">● Connected</span>'
    : '<span class="bad">● Disconnected</span>';
  const vxMs    = (vx    * state.maxLinear).toFixed(1);
  const vyMs    = (vy    * state.maxLinear).toFixed(1);
  const omgRps  = (omega * state.maxAngular).toFixed(2);
  const hdgDeg  = (state.headingRad * 180 / Math.PI).toFixed(1);
  el.innerHTML = `${connEl} &nbsp;|&nbsp; `
    + `x=${state.x.toFixed(2)} y=${state.y.toFixed(2)} hdg=${hdgDeg}° &nbsp;|&nbsp; `
    + `vx=${vxMs} vy=${vyMs} ω=${omgRps}`;
}

// Initial render
drawField();
window.addEventListener('resize', drawField);
</script>
</body>
</html>
